name: CD 

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: Docker setup[login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Deploy the containers with Docker Compose
        run: |
          docker compose pull
          docker compose up -d
             