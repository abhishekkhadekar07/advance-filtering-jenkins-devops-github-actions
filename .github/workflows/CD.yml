name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI"]
    types:  
      - completed
jobs:
  deploy:
    runs-on: self-hosted
    steps:
    - name: pull Docker image
      run: sudo docker pull akhadekar/advance-frontend:latest
    - name: Delete Old container
      run: sudo docker rm -f akhadekar/advance-frontend:latest
    - name: Run Docker container
      run: sudo docker run -d -p 8080:80 --name advance-frontend:latest akhadekar/advance-frontend:latest
    